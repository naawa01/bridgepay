<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100">
  <!-- Background -->
  <rect width="280" height="100" rx="14" fill="#1C1109"/>
  
  <!-- Kente strip top -->
  <rect x="0" y="0" width="70" height="6" rx="0" fill="#C1440E"/>
  <rect x="70" y="0" width="70" height="6" fill="#D4A853"/>
  <rect x="140" y="0" width="70" height="6" fill="#4A6741"/>
  <rect x="210" y="0" width="70" height="6" fill="#C1440E"/>

  <!-- Bridge -->
  <text x="14" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="56"
    font-weight="700"
    fill="#E8D5B0">Bridge</text>

  <!-- Pay -->
  <text x="180" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="56"
    font-weight="700"
    fill="#D4A853">Pay</text>

  <!-- Bottom accent -->
  <rect x="14" y="80" width="252" height="2.5" rx="1" fill="#D4A853" opacity="0.25"/>
</svg>
