<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePay — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav>
    <a href="/" class="logo">Bridge<span>Pay</span></a>
</nav>

<div class="page-center">
    <div class="auth-box">
        <h2>Welcome back</h2>
        <p>Don't have an account? <a href="/signup">Sign up</a></p>

        <div class="form">
            <div class="form-group">
                <label>Mobile Money Number</label>
                <input type="tel" id="phone" placeholder="+233 XX XXX XXXX" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" />
            </div>

           <div class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
    <input type="checkbox" id="rememberMe" style="width:auto; accent-color:var(--gold);" />
    <label for="rememberMe" style="text-transform:none; letter-spacing:0; font-size:14px; color:var(--sand); opacity:0.7;">Remember me</label>
</div> 

            <button class="btn-primary" id="loginBtn" onclick="login()">
                Sign In
            </button>

            <p id="status-msg" class="status-msg"></p>

            <p class="divider">Don't have an account? <a href="/signup">Create one here</a></p>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;
async function login() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('status-msg');
    const btn = document.getElementById('loginBtn');

    // ── VALIDATION ──
    if (!phone) {
        msg.className = 'status-msg error';
        msg.textContent = "Please enter your phone number.";
        return;
    }

    const phoneClean = phone.replace(/\s+/g, '');
    if (!/^\+?[\d]{9,13}$/.test(phoneClean)) {
        msg.className = 'status-msg error';
        msg.textContent = "Enter a valid phone number (e.g. +233241234567).";
        return;
    }

    if (!password) {
        msg.className = 'status-msg error';
        msg.textContent = "Please enter your password.";
        return;
    }

    // ── SUBMIT ──
    msg.className = 'status-msg';
    msg.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Please wait...';

    try {
        const res = await fetch(`${API}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone, password })
        });

        const data = await res.json();

        if (data.success) {
            btn.textContent = '✓ Signed in!';
            msg.textContent = "Welcome back! Redirecting...";
            setTimeout(() => window.location.href = '/', 1000);
        } else {
            msg.className = 'status-msg error';
            msg.textContent = data.error || "Login failed. Please try again.";
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    } catch {
        msg.className = 'status-msg error';
        msg.textContent = "Could not reach server. Is Flask running?";
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
}
</script>
</body>
</html>
