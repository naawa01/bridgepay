<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePay — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav>
    <a href="/" class="logo">Bridge<span>Pay</span></a>
</nav>

<div class="page-center">
    <div class="auth-box">
        <h2>Welcome back</h2>
        <p>Don't have an account? <a href="/signup">Sign up</a></p>

        <div class="form">
            <div class="form-group">
                <label>Mobile Money Number</label>
                <input type="tel" id="phone" placeholder="+233 XX XXX XXXX" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" />
            </div>

            <button class="btn-primary" id="loginBtn" onclick="login()">
                Sign In
            </button>

            <p id="status-msg" class="status-msg"></p>

            <p class="divider">Don't have an account? <a href="/signup">Create one here</a></p>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;

    async function login() {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('loginBtn');

        if (!phone || !password) {
            msg.className = 'status-msg error';
            msg.textContent = "Please enter your phone number and password.";
            return;
        }

        msg.className = 'status-msg';
        msg.textContent = "Signing in...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone, password })
            });

            const data = await res.json();

            if (data.success) {
                msg.textContent = "Welcome back! Redirecting...";
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                msg.className = 'status-msg error';
                msg.textContent = data.error || "Login failed. Please try again.";
                btn.disabled = false;
            }
        } catch {
            msg.className = 'status-msg error';
            msg.textContent = "Could not reach server. Is Flask running?";
            btn.disabled = false;
        }
    }

    // Allow pressing Enter to login
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
