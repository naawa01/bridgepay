<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePay — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav>
    <a href="/" class="logo">Bridge<span>Pay</span></a>
</nav>

<div class="page-center">
    <div class="auth-box">
        <h2>Create account</h2>
        <p>Already have an account? <a href="/login">Sign in</a></p>

        <div class="form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Kwame Asante" />
            </div>
            <div class="form-group">
                <label>Mobile Money Number</label>
                <input type="tel" id="phone" placeholder="+233 XX XXX XXXX" />
            </div>
            <div class="form-group">
                <label>Email (optional)</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Choose a strong password" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" />
            </div>

            <button class="btn-primary" id="signupBtn" onclick="signup()">
                Create Account
            </button>

            <p id="status-msg" class="status-msg"></p>

            <p class="divider">or</p>
            <p class="divider">Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;

    async function signup() {
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('signupBtn');

        if (!phone || !password) {
            msg.className = 'status-msg error';
            msg.textContent = "Phone number and password are required.";
            return;
        }

        if (password !== confirmPassword) {
            msg.className = 'status-msg error';
            msg.textContent = "Passwords do not match.";
            return;
        }

        if (password.length < 6) {
            msg.className = 'status-msg error';
            msg.textContent = "Password must be at least 6 characters.";
            return;
        }

        msg.className = 'status-msg';
        msg.textContent = "Creating your account...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/signup`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ full_name: fullName, phone, email, password })
            });

            const data = await res.json();

            if (data.success) {
                msg.textContent = "Account created! Redirecting...";
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                msg.className = 'status-msg error';
                msg.textContent = data.error || "Signup failed. Please try again.";
                btn.disabled = false;
            }
        } catch {
            msg.className = 'status-msg error';
            msg.textContent = "Could not reach server. Is Flask running?";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
