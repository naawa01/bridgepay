<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePay — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --clay:      #C1440E;
            --gold:      #D4A853;
            --sand:      #E8D5B0;
            --bark:      #3D2B1F;
            --soil:      #6B3F2A;
            --harmattan: #F5ECD7;
            --dusk:      #1C1109;
            --cream:     #FAF4E8;
            --danger:    #E05C3A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dusk);
            color: var(--sand);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 56px;
            border-bottom: 1px solid rgba(212, 168, 83, 0.15);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--sand);
            text-decoration: none;
        }

        .logo span { color: var(--gold); }

        .page-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--harmattan);
            margin-bottom: 8px;
        }

        .auth-box p {
            color: rgba(232, 213, 176, 0.5);
            font-size: 15px;
            margin-bottom: 36px;
        }

        .auth-box a {
            color: var(--gold);
            text-decoration: none;
        }

        .form { display: flex; flex-direction: column; gap: 18px; }

        .form-group { display: flex; flex-direction: column; gap: 7px; }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(232, 213, 176, 0.55);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            background: rgba(61, 43, 31, 0.5);
            border: 1px solid rgba(212, 168, 83, 0.15);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--harmattan);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-group input::placeholder { color: rgba(232, 213, 176, 0.25); }
        .form-group input:focus { border-color: var(--gold); }

        .btn-primary {
            background: var(--clay);
            color: var(--cream);
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 4px;
        }

        .btn-primary:hover { background: #A8380A; }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

        .status-msg {
            font-size: 14px;
            color: var(--gold);
            min-height: 18px;
            text-align: center;
        }

        .status-msg.error { color: var(--danger); }

        .divider {
            text-align: center;
            color: rgba(232, 213, 176, 0.3);
            font-size: 13px;
            margin: 4px 0;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">Bridge<span>Pay</span></a>
</nav>

<div class="page-center">
    <div class="auth-box">
        <h2>Create account</h2>
        <p>Already have an account? <a href="/login">Sign in</a></p>

        <div class="form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Kwame Asante" />
            </div>
            <div class="form-group">
                <label>Mobile Money Number</label>
                <input type="tel" id="phone" placeholder="+233 XX XXX XXXX" />
            </div>
            <div class="form-group">
                <label>Email (optional)</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Choose a strong password" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" />
            </div>

            <button class="btn-primary" id="signupBtn" onclick="signup()">
                Create Account
            </button>

            <p id="status-msg" class="status-msg"></p>

            <p class="divider">or</p>
            <p class="divider">Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;

    async function signup() {
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('signupBtn');

        if (!phone || !password) {
            msg.className = 'status-msg error';
            msg.textContent = "Phone number and password are required.";
            return;
        }

        if (password !== confirmPassword) {
            msg.className = 'status-msg error';
            msg.textContent = "Passwords do not match.";
            return;
        }

        if (password.length < 6) {
            msg.className = 'status-msg error';
            msg.textContent = "Password must be at least 6 characters.";
            return;
        }

        msg.className = 'status-msg';
        msg.textContent = "Creating your account...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/signup`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ full_name: fullName, phone, email, password })
            });

            const data = await res.json();

            if (data.success) {
                msg.textContent = "Account created! Redirecting...";
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                msg.className = 'status-msg error';
                msg.textContent = data.error || "Signup failed. Please try again.";
                btn.disabled = false;
            }
        } catch {
            msg.className = 'status-msg error';
            msg.textContent = "Could not reach server. Is Flask running?";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
